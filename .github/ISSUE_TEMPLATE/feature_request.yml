name: Feature request
description: Suggest a product improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: architecture
    attributes:
      label: Architecture notes
      description: Mention whether this should use services, repositories, or the event system.
    validations:
      required: false


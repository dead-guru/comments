name: Bug report
description: Report a reproducible problem in deadcomments.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, OAuth tokens, session cookies, raw IPs, raw emails, raw user agents, or tripcode secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Start the server with ...
        2. Open ...
        3. Submit ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        deadcomments version/commit:
        Go version:
        OS:
        Browser:
        Deployment mode:
    validations:
      required: false


name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify go.mod and go.sum
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Verify gofmt
        run: |
          files="$(gofmt -l cmd internal)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Build server
        run: go build -trimpath ./cmd/server

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run govulncheck
        run: |
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            golang:1.25-alpine \
            sh -c 'go run golang.org/x/vuln/cmd/govulncheck@latest ./...'

  docusaurus:
    name: Docusaurus Test Stand Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: examples/docusaurus

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/docusaurus/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build

  docker-compose:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose file
        run: docker compose config

      - name: Start stack
        run: docker compose up --build -d

      - name: Smoke test comments service
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs comments
          exit 1

      - name: Smoke test widget
        run: curl -fsS http://localhost:8080/widget.js | grep -q "deadcomments:height"

      - name: Smoke test Docusaurus
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/docs/intro > /tmp/docusaurus-intro.html; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs docusaurus
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans

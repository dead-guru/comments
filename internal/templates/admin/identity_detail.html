{{template "admin_head" .}}
<h1>{{.Identity.DisplayName}}</h1>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<p class="notice">Tripcode secrets are never shown after creation. To change this identity's secret, use the reset form below.</p>
{{template "identity_form_fields" .}}
<section class="panel">
  <h2>Reset secret</h2>
  <form class="form" method="post" action="/admin/identities/{{.Identity.ID}}/reset-secret">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <div class="field"><label>New tripcode secret</label><input type="password" name="secret" required autocomplete="new-password"></div>
    <button>Reset secret</button>
  </form>
</section>
<section class="panel">
  <h2>Delete identity</h2>
  <form method="post" action="/admin/identities/{{.Identity.ID}}/delete" data-confirm="Delete reserved identity {{.Identity.DisplayName}}?" data-confirm-token="DELETE">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <button class="danger">Delete identity</button>
  </form>
</section>
{{template "admin_foot" .}}

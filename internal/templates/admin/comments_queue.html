{{template "admin_head" .}}
<h1>Comments {{if .Status}}<span class="muted">{{.Status}}</span>{{end}}</h1>
<form class="panel actions" method="get" action="/admin/comments">
  <input name="q" placeholder="Search body or author">
  <select name="status">
    <option value="">Any status</option>
    <option value="pending">pending</option><option value="approved">approved</option><option value="rejected">rejected</option><option value="spam">spam</option><option value="deleted">deleted</option>
  </select>
  <button>Filter</button>
</form>
<p class="muted keyboard-help">Shortcuts: <kbd>j</kbd>/<kbd>k</kbd> move, <kbd>a</kbd> approve, <kbd>s</kbd> spam, <kbd>r</kbd> reject.</p>
{{template "comments_table" dict "Comments" .Comments "CSRFToken" .CSRFToken "Bulk" true "Inline" true "ReturnTo" .CurrentPath}}
{{template "admin_foot" .}}

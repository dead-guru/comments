{{template "admin_head" .}}
<div class="actions"><h1>Sites</h1><a class="button primary" href="/admin/sites/new">New site</a></div>
<table>
  <thead><tr><th>Name</th><th>Key</th><th>Origins</th><th>Moderation</th><th>Default page</th><th>Actions</th></tr></thead>
  <tbody>
  {{range .Sites}}
  <tr>
    <td>{{.Name}}</td><td><code>{{.Key}}</code></td><td>{{range .AllowedOrigins}}<div>{{.}}</div>{{end}}</td>
    <td>{{.DefaultModerationMode}}</td><td>{{.DefaultPageState}}</td>
    <td><a href="/admin/sites/{{.ID}}">Settings</a> · <a href="/admin/sites/{{.ID}}/pages">Pages</a></td>
  </tr>
  {{else}}<tr><td colspan="6" class="muted">No sites yet.</td></tr>{{end}}
  </tbody>
</table>
{{template "admin_foot" .}}

services:
  comments:
    build:
      context: .
      dockerfile: Dockerfile
    image: deadcomments:local
    environment:
      BASE_URL: http://localhost:8080
      DATABASE_PATH: /data/deadcomments.db
      DATABASE_MAX_OPEN_CONNS: ${DATABASE_MAX_OPEN_CONNS:-}
      DATABASE_MAX_IDLE_CONNS: ${DATABASE_MAX_IDLE_CONNS:-}
      PORT: "8080"
      DEADCOMMENTS_ENV: development
      DEADCOMMENTS_DEV_SEED: "1"
      BEHIND_TRUSTED_PROXY: "false"
      SERVER_SECRET: ${SERVER_SECRET:?Set SERVER_SECRET in .env for local compose}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env for local compose}
      TRIPCODE_SECRET: ${TRIPCODE_SECRET:?Set TRIPCODE_SECRET in .env for local compose}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_ALLOWED_LOGINS: ${GITHUB_ALLOWED_LOGINS:-}
    ports:
      - "8080:8080"
    volumes:
      - deadcomments-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/deadcomments", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  docusaurus:
    build:
      context: ./examples/docusaurus
      dockerfile: Dockerfile
    image: deadcomments-docusaurus:local
    ports:
      - "3000:3000"
    depends_on:
      comments:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  deadcomments-data:
